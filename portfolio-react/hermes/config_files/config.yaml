# Hermes 配置文件
# 参考 WeKnora config/config.yaml，精简为 MVP 所需

# 服务器配置
server:
  port: 8000
  host: "0.0.0.0"

# 会话配置
conversation:
  max_rounds: 5
  keyword_threshold: 0.3
  embedding_top_k: 30
  vector_threshold: 0.2
  rerank_threshold: 0.3
  rerank_top_k: 30
  fallback_strategy: "model"  # fixed | model
  fallback_response: "Sorry, I am unable to answer this question."
  fallback_prompt_id: "model_fallback"  # from prompts/fallback.yaml
  enable_rewrite: true
  rewrite_prompt_id: "default_rewrite"  # from prompts/rewrite.yaml
  generate_summary_prompt_id: "default_summary"  # from prompts/generate_summary.yaml
  generate_session_title_prompt_id: "default_session_title"
  summary:
    max_input_chars: 16384
    temperature: 0.3
    max_completion_tokens: 2048
    prompt_id: "default_kb"  # from prompts/system_prompt.yaml
    context_template_id: "default_context"  # from prompts/context_template.yaml
  extract_keywords_prompt_id: "default_keywords_extraction"
  generate_questions_prompt_id: "default_generate_questions"

# 知识库配置
knowledge_base:
  chunk_size: 512
  chunk_overlap: 50
  split_markers: ["\n\n", "\n", "。"]
  document_process_timeout: 2h

# RAG 检索配置
rag:
  vector_top_k: 10
  keyword_top_k: 10
  fusion_weights:
    vector: 0.6
    keyword: 0.4
  rrf_k: 60
  context_max_chars: 4000

# Agent 配置
agent:
  max_iterations: 20
  token_compress_threshold: 0.8
  memory_consolidate_threshold: 0.5
  max_context_tokens: 32000
  default_system_prompt_id: "rag_agent"  # from prompts/agent_system.yaml

# 访客配额
guest_quota:
  daily_limit: 20
  reset_hours: 24

# LLM 配置（从环境变量读取，这里仅作 fallback 参考）
llm:
  model: "deepseek-chat"
  temperature: 0.7
  max_tokens: 4096
  timeout: 60
