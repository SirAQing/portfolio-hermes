version: "3.8"

services:
  hermes:
    build:
      context: ./portfolio-react/hermes
      dockerfile: Dockerfile
    container_name: hermes-backend
    env_file: .env
    environment:
      # Override local defaults for container paths
      DATABASE_PATH: /app/data/hermes.db
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - ./data:/app/data
      - ./chroma_data:/app/chroma_data
    networks:
      - hermes-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: hermes-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    networks:
      - hermes-net
    depends_on:
      hermes:
        condition: service_healthy
    restart: unless-stopped

networks:
  hermes-net:
    driver: bridge
